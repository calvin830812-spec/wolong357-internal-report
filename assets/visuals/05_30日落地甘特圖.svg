<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">30日落地甘特圖</title>
  <desc id="desc">呈現3日、7日、14日、30日的落地任務與產出。</desc>
  <defs>
    <style>
      .bg{fill:#F7F3EA}.panel{fill:#fffdf8;stroke:#D8E2DF;stroke-width:2}.text{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",Arial,sans-serif;fill:#173137}.title{font-size:34px;font-weight:800}.sub{font-size:18px}.small{font-size:15px}.label{font-size:17px;font-weight:800}.tiny{font-size:13px}.teal{fill:#0F5F6D}.dark{fill:#0A4E59}.light{fill:#1F7885}.gold{fill:#B89A5E}.grid{stroke:#D8E2DF;stroke-width:1}.muted{fill:#5E6E6F}
    </style>
  </defs>
  <rect width="1200" height="760" class="bg"/>
  <rect x="40" y="36" width="1120" height="688" rx="26" class="panel"/>
  <text x="76" y="92" class="text title">30日落地甘特圖</text>
  <text x="76" y="126" class="text sub">圖像目的：把30日內落地計畫拆成時間、任務、負責人、產出與驗收。</text>
  <text x="76" y="154" class="muted small">使用章節建議：第九章30日內落地執行計畫、第十二章執行任務拆解與驗收標準</text>

  <g transform="translate(250 210)">
    <line x1="0" y1="0" x2="800" y2="0" class="grid"/>
    <line x1="0" y1="58" x2="800" y2="58" class="grid"/>
    <line x1="0" y1="116" x2="800" y2="116" class="grid"/>
    <line x1="0" y1="174" x2="800" y2="174" class="grid"/>
    <line x1="0" y1="232" x2="800" y2="232" class="grid"/>
    <line x1="0" y1="290" x2="800" y2="290" class="grid"/>
    <line x1="80" y1="-36" x2="80" y2="310" class="grid"/>
    <line x1="187" y1="-36" x2="187" y2="310" class="grid"/>
    <line x1="373" y1="-36" x2="373" y2="310" class="grid"/>
    <line x1="800" y1="-36" x2="800" y2="310" class="grid"/>
    <text x="40" y="-12" text-anchor="middle" class="text small">3日</text>
    <text x="134" y="-12" text-anchor="middle" class="text small">7日</text>
    <text x="280" y="-12" text-anchor="middle" class="text small">14日</text>
    <text x="586" y="-12" text-anchor="middle" class="text small">30日</text>
    <rect x="0" y="18" width="80" height="24" rx="12" class="dark"/>
    <rect x="0" y="76" width="187" height="24" rx="12" class="teal"/>
    <rect x="187" y="134" width="186" height="24" rx="12" class="light"/>
    <rect x="373" y="192" width="427" height="24" rx="12" class="gold"/>
    <rect x="0" y="250" width="800" height="24" rx="12" fill="#E6F0EE" stroke="#0F5F6D"/>
  </g>

  <g transform="translate(76 225)">
    <text class="text label">臥龍357退場閉環</text><text y="26" class="muted tiny">陳俞安＋莊穎霖｜文件返還、支持戶說明、財務待補清單</text>
    <text y="58" class="text label">六項制度模板V1</text><text y="84" class="muted tiny">莊穎霖主責｜六項模板可套用到真實案件</text>
    <text y="116" class="text label">選一案試跑</text><text y="142" class="muted tiny">董事長／主管決定，莊穎霖執行｜試跑案件紀錄</text>
    <text y="174" class="text label">回收試跑結果</text><text y="200" class="muted tiny">莊穎霖＋團隊｜制度修正、Asana任務化、訓練題材</text>
    <text y="232" class="text label">持續原則</text><text y="258" class="muted tiny">不把待補資料寫成定論；每項任務需有負責人與驗收標準</text>
  </g>

  <rect x="76" y="610" width="1048" height="62" rx="14" fill="#F2F7F4" stroke="#D8E2DF"/>
  <text x="98" y="638" class="text small">對應報告內容來源：第九章30日內落地執行計畫、第十二章執行任務拆解與驗收標準。</text>
  <text x="98" y="663" class="muted small">建議嵌入於報告執行計畫段落，作為主管追蹤任務與驗收的視覺摘要。</text>
</svg>
